<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Vũ Thành Long</title>
    
    <!-- Nhúng Font chữ Inter và thư viện Icon FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ==========================================
           1. CẤU HÌNH BIẾN MÀU SẮC & GIAO DIỆN CHUNG
           ========================================== */
        :root {
            --primary-neon: #00ff51;
            --primary-glow: rgba(0, 255, 81, 0.4);
            --bg-dark: #070a12;
            --glass-bg: rgba(13, 19, 33, 0.45);
            --glass-border: rgba(0, 255, 81, 0.18);
            --text-white: #ffffff;
            --text-muted: #94a3b8;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas hình nền động hạt sáng */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* KHỐI BAO BỌC ĐỂ ĐỊNH VỊ NÚT ZALO NGAY CẠNH KHUNG CARD */
        .profile-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 480px;
            z-index: 2;
        }

        /* ==========================================
           2. STYLE CARD CHÍNH (GLASSMORPHISM)
           ========================================== */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 45px 35px;
            border-radius: 32px;
            text-align: center;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.51), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        box-shadow 0.4s ease, border-color 0.4s ease;
            position: relative; 
            overflow: hidden;
        }

        .profile-wrapper:hover .card {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px rgba(0, 255, 81, 0.1), 
                        0 15px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(0, 255, 81, 0.35);
        }

        /* ==========================================
           3. KHỐI AVATAR VÀ SKILL ICONS QUỸ ĐẠO
           ========================================== */
        .avatar-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 35px;
        }

        .avatar-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary-neon);
            filter: blur(20px);
            opacity: 0.25;
            z-index: 1;
        }

        .avatar-img {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary-neon);
            object-fit: cover;
            box-shadow: 0 0 25px var(--primary-glow);
        }

        /* Các Icon quay theo quỹ đạo tròn */
        .icon-orbit {
            position: absolute;
            z-index: 3;
            width: 38px;
            height: 38px;
            background: #111827;
            border: 2px solid var(--primary-neon);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: var(--primary-neon);
            box-shadow: 0 0 12px var(--primary-glow);
            transform: translate(-50%, -50%);
            transition: background 0.3s, color 0.3s, font-size 0.3s;
        }

        .icon-orbit:hover {
            background: var(--primary-neon);
            color: #111827;
            font-size: 17px;
            cursor: help;
        }

        /* ==========================================
           4. THÔNG TIN CHỮ CÁ NHÂN & QUỐC KỲ
           ========================================== */
        .name {
            margin: 0 0 8px 0;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 60%, #a7f3d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .job {
            display: inline-block;
            color: var(--primary-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .flags-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .flag-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .flag-wrapper:hover {
            transform: scale(1.2) rotate(8deg);
            border-color: var(--primary-neon);
        }

        .flag-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* HUY HIỆU BADGES */
        .badges-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-verified {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .badge-pro {
            background: rgba(0, 255, 81, 0.08);
            color: var(--primary-neon);
            border: 1px solid rgba(0, 255, 81, 0.25);
        }

        /* ==========================================
           5. LƯỚI THÔNG TIN CHI TIẾT (INFO GRID)
           ========================================== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(62, 109, 67, 0.45);
            padding: 16px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            transition: background 0.3s, border-color 0.3s, transform 0.3s;
        }

        .info-box:hover {
            background: rgba(0, 255, 81, 0.03);
            border-color: rgba(0, 255, 81, 0.42);
            transform: translateY(-2px);
        }

        .info-icon {
            font-size: 18px;
            color: var(--primary-neon);
            opacity: 0.85;
        }

        .info-text span {
            display: block;
            color: var(--text-muted);
            font-size: 11px;
            margin-bottom: 2px;
        }

        .info-text b {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #f1f5f9;
        }

        /* ==========================================
           6. NÚT CHAT ZALO ĐẶT NGAY CẠNH PHẢI KHUNG CARD (IMAGE_2CDC05.PNG)
           ========================================== */
        .zalo-card-btn {
            position: absolute;
            right: -30px; /* Nhô ra bên phải khung */
            top: 50%;
            transform: translateY(-50%);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #00ff55; /* Xanh lá neon chuẩn ảnh */
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            z-index: 99;
            box-shadow: 0 0 20px #00ff55,
                        0 0 40px rgba(0, 255, 85, 0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), right 0.3s ease;
        }

        .zalo-card-btn:hover {
            transform: translateY(-50%) scale(1.12);
            right: -35px;
        }

        /* Icon bong bóng chat màu đen tương phản cực chuẩn */
        .zalo-card-btn i {
            font-size: 30px;
            color: #070a12;
            position: relative;
            z-index: 2;
        }

        .zalo-card-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #00ff55;
            z-index: 1;
            animation: zaloPulse 2.2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }

        .zalo-card-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 22px;
            height: 22px;
            padding: 0 4px;
            background: #ff2d2d;
            color: #fff;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            z-index: 3;
            box-shadow: 0 2px 8px rgba(255, 45, 45, 0.5);
            animation: badgeWobble 4s ease-in-out infinite;
        }

        /* ==========================================
           7. CÁC HIỆU ỨNG HOẠT HỌA (ANIMATIONS)
           ========================================== */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zaloPulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes badgeWobble {
            0%, 90%, 100% { transform: rotate(0deg); }
            92% { transform: rotate(-15deg) scale(1.1); }
            94% { transform: rotate(13deg) scale(1.1); }
            96% { transform: rotate(-10deg) scale(1.1); }
            98% { transform: rotate(8deg) scale(1.1); }
        }

        /* RESPONSIVE CHO TRÊN ĐIỆN THOẠI */

            /* Tối ưu nút trên mobile để không bị tràn màn hình */

        .google-ribbon {

        /* Định màu từng chữ cái theo logo Google */
        .g1 { color: #4285F4; }

        .plus { color: #1500ff; } /* Dấu + màu xám */
        .zalo-contact-footer {
            display: flex;
            align-items: center;       /* Căn icon và text thẳng hàng theo chiều dọc */
            justify-content: center;

            text-decoration: none;

            margin-top: 20px;

            border-radius: 8px;

        }

        /* Chỉnh icon to hơn và thẳng hàng */
        .zalo-contact-footer i {

            color: #25D366;            /* Màu xanh Zalo chuẩn */

        /* Tìm class .zalo-text và sửa lại như sau */
        .zalo-text {
            display: flex;

        /* Màu vàng neon cho số điện thoại */

            color: #f7ff00;            /* Vàng neon */

        }

    </style>

<body>

    <!-- CÁC ĐOẠN XỬ LÝ SỰ KIỆN JAVASCRIPT -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- XỬ LÝ BACKGROUND HẠT SÁNG CANVAS ---
            const canvas = document.getElementById("particle-canvas");
            const ctx = canvas.getContext("2d");
            let w, h, particles;
            const particleCount = 300;

            function initCanvas() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        size: Math.random() * 1.2 + 0.3,
                        speedX: (Math.random() - 0.5) * 0.4,
                        speedY: (Math.random() - 0.5) * 0.4,
                        alpha: Math.random() * 0.5 + 0.1
                    });
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, w, h);
                for (let i = 0; i < particleCount; i++) {
                    let p = particles[i];
                    ctx.fillStyle = `rgba(0, 255, 81, ${p.alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    p.x += p.speedX;
                    p.y += p.speedY;

                    if (p.x < 0 || p.x > w) p.speedX *= -1;
                    if (p.y < 0 || p.y > h) p.speedY *= -1;
                }
                requestAnimationFrame(animateParticles);
            }

            window.addEventListener("resize", initCanvas);
            initCanvas();
            animateParticles();

            // --- XỬ LÝ QUỸ ĐẠO XOAY ICON XOAY QUANH AVATAR ---
            const orbitIcons = [
                document.getElementById("orbit-i1"),
                document.getElementById("orbit-i2"),
                document.getElementById("orbit-i3"),
                document.getElementById("orbit-i4")
            ];

            let angle = 0;
            const radius = 98; 
            const speed = 0.007; 

            function updateOrbit() {
                const container = document.querySelector(".avatar-container");
                if (!container) return;
                
                const centerX = container.clientWidth / 2;
                const centerY = container.clientHeight / 2;

                orbitIcons.forEach((icon, index) => {
                    if (!icon) return;
                    let currentAngle = angle + (index * (Math.PI / 2));
                    let x = centerX + radius * Math.cos(currentAngle);
                    let y = centerY + radius * Math.sin(currentAngle);

                    icon.style.left = `${x}px`;
                    icon.style.top = `${y}px`;
                });

                angle += speed;
                requestAnimationFrame(updateOrbit);
            }

            updateOrbit();
        });
    </script>
